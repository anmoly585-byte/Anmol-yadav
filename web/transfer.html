<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Transfer - Online Banking System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>🏦 Online Banking</h2>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="transfer.html" class="active">Transfer</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="index.html" class="logout-btn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="transfer-container">
        <h1>💸 Transfer Money</h1>

        <div class="transfer-box">
            <form id="transferForm">
                <div class="form-group">
                    <label for="from_account">From Account:</label>
                    <select id="from_account" name="from_account" required>
                        <option value="">Select Account</option>
                        <option value="1001234567">Saving - 1001234567 (₹50,000)</option>
                        <option value="1001234568">Current - 1001234568 (₹1,25,000)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="to_account">Recipient Account:</label>
                    <input type="text" id="to_account" name="to_account" required placeholder="Enter recipient account number">
                </div>

                <div class="form-group">
                    <label for="amount">Amount:</label>
                    <input type="number" id="amount" name="amount" required placeholder="Enter amount" min="1" step="0.01">
                </div>

                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" placeholder="Enter reason for transfer"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Transfer Money</button>
            </form>
        </div>
    </div>

    <script src="../js/transfer.js"></script>
</body>
</html>
